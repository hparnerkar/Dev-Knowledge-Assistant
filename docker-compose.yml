version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dka-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-ada-002}
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-dev_knowledge}
      - APP_ENV=${APP_ENV:-development}
      - TOP_K_RESULTS=${TOP_K_RESULTS:-5}
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
    volumes:
      # Persist ChromaDB across container restarts
      - chroma_data:/app/chroma_store
      # Mount sample docs so you can add files without rebuilding
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dka-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  chroma_data:
    driver: local
